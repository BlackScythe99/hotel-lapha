<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">Hotel Lapha</h1>
        <ul class="nav-links">

<section class="contact">
    <h2>Contact Us</h2>

    <div class="contact-container">

        <!-- Info -->
        <div class="contact-info">
            <p><strong>Address:</strong> Lainchour, Kathmandu</p>
            <p><strong>Phone:</strong> 01-4514971</p>
            <p><strong>Email:</strong> hotellapha100@gmail.com</p>

            <!-- Call Button -->
            <a href="tel:014514971">
                <button>Call Now</button>
            </a>

            <!-- Email Button -->
            <a href="mailto:hotellapha100@gmail.com">
                <button>Email Us</button>
            </a>
        </div>

        <!-- Form -->
        <div class="contact-form">
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="date" required>
                <textarea placeholder="Message"></textarea>
                <button type="submit">Send Inquiry</button>
            </form>
        </div>

    </div>
</section>
